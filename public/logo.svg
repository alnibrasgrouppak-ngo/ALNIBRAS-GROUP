<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Metallic Gold Gradients -->
    <linearGradient id="gold-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA8015" />
      <stop offset="20%" stop-color="#C9A227" />
      <stop offset="40%" stop-color="#F6DF7D" />
      <stop offset="60%" stop-color="#FFF5CE" />
      <stop offset="80%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#AA8015" />
    </linearGradient>

    <linearGradient id="gold-bright" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6DF7D" />
      <stop offset="35%" stop-color="#FFF5CE" />
      <stop offset="70%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#AA8015" />
    </linearGradient>

    <linearGradient id="gold-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#543F02" />
      <stop offset="50%" stop-color="#AA8015" />
      <stop offset="100%" stop-color="#543F02" />
    </linearGradient>

    <!-- Prismatic Crystal Gradients -->
    <linearGradient id="crystal-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0F7FA" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#80DEEA" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#26C6DA" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#00ACC1" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="crystal-center" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#E2F1F8" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#B0BEC5" stop-opacity="0.75" />
    </linearGradient>

    <linearGradient id="crystal-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF59D" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#FFCC80" stop-opacity="0.7" />
      <stop offset="80%" stop-color="#FF8A80" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#EA80FC" stop-opacity="0.9" />
    </linearGradient>

    <radialGradient id="crystal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#80DEEA" stop-opacity="0.5" />
      <stop offset="30%" stop-color="#B39DDB" stop-opacity="0.3" />
      <stop offset="70%" stop-color="#FF8A80" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0E1F12" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadows for 3D Depth -->
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="glow-bright" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#shadow-3d)">
    <!-- 1. CRYSTAL GLOW BACKGROUND -->
    <circle cx="400" cy="220" r="70" fill="url(#crystal-glow)" />

    <!-- 2. ORNATE LANTERN (BACKPLANE & INNER LATTICE) -->
    <!-- Dome Base & Arch Backings -->
    <path d="M 350,155 L 450,155 L 450,300 L 350,300 Z" fill="#08140B" opacity="0.6" />
    
    <!-- Fine Lattice Work (Background Patterns) -->
    <g stroke="url(#gold-dark)" stroke-width="0.75" fill="none" opacity="0.4">
      <!-- Star Lattice Pattern inside center column -->
      <path d="M 380,160 L 420,200 M 420,160 L 380,200 M 380,200 L 420,240 M 420,200 L 380,240 M 380,240 L 420,280 M 420,240 L 380,280 M 380,280 L 420,300 M 420,280 L 380,300" />
      <!-- Star Lattice Pattern inside left column -->
      <path d="M 350,170 L 380,200 M 380,170 L 350,200 M 350,200 L 380,230 M 380,200 L 350,230 M 350,230 L 380,260 M 380,230 L 350,260 M 350,260 L 380,290" />
      <!-- Star Lattice Pattern inside right column -->
      <path d="M 420,170 L 450,200 M 450,170 L 420,200 M 420,200 L 450,230 M 450,200 L 420,230 M 420,230 L 450,260 M 450,230 L 420,260 M 420,260 L 450,290" />
    </g>

    <!-- 3. CENTRAL CRYSTAL SHARD (PRISMATIC GLOW) -->
    <g filter="url(#glow-bright)">
      <!-- Left Facet -->
      <polygon points="400,170 380,195 380,245 400,270" fill="url(#crystal-left)" />
      <!-- Center Facet -->
      <polygon points="400,170 400,270 408,245 408,195" fill="url(#crystal-center)" />
      <!-- Right Facet -->
      <polygon points="408,195 408,245 400,270 420,245 420,195" fill="url(#crystal-right)" />
      <!-- Top/Bottom Facet Caps for refraction reflections -->
      <polygon points="400,170 380,195 400,190" fill="#FFFFFF" opacity="0.6" />
      <polygon points="400,170 420,195 400,190" fill="#FFFFFF" opacity="0.4" />
      <polygon points="400,270 380,245 400,250" fill="#FFFFFF" opacity="0.3" />
      <polygon points="400,270 420,245 400,250" fill="#FFFFFF" opacity="0.5" />
    </g>

    <!-- 4. ORNATE LANTERN (FOREGROUND STRUCTURE) -->
    <!-- Top Hanging Loop -->
    <circle cx="400" cy="72" r="20" fill="none" stroke="url(#gold-primary)" stroke-width="6" />
    <circle cx="400" cy="72" r="8" fill="url(#gold-bright)" />
    
    <!-- Top Cap Dome -->
    <path d="M 400,88 C 403,88 405,92 405,95 L 395,95 C 395,92 397,88 400,88 Z" fill="url(#gold-bright)" />
    <!-- Main Dome -->
    <path d="M 400,95 Q 365,130 350,155 L 450,155 Q 435,130 400,95 Z" fill="url(#gold-primary)" />
    <!-- Dome Ribs (Adds 3D volumetric ridges) -->
    <path d="M 400,95 Q 380,130 375,155 M 400,95 Q 400,130 400,155 M 400,95 Q 420,130 425,155" stroke="url(#gold-bright)" stroke-width="2" fill="none" />
    
    <!-- Arch Headers & Moldings -->
    <rect x="345" y="155" width="110" height="8" rx="2" fill="url(#gold-bright)" />
    <rect x="340" y="163" width="120" height="4" rx="1" fill="url(#gold-dark)" />
    
    <!-- Columns (Left, Right, Inner) -->
    <!-- Outer Left Column -->
    <path d="M 347,167 L 351,167 L 351,300 L 347,300 Z" fill="url(#gold-primary)" />
    <!-- Outer Right Column -->
    <path d="M 449,167 L 453,167 L 453,300 Z" fill="url(#gold-primary)" />
    <!-- Left-Center Column -->
    <path d="M 377,167 L 381,167 L 381,300 L 377,300 Z" fill="url(#gold-primary)" />
    <!-- Right-Center Column -->
    <path d="M 419,167 L 423,167 L 423,300 L 419,300 Z" fill="url(#gold-primary)" />

    <!-- Islamic Arch Top Details -->
    <!-- Left Arch -->
    <path d="M 351,185 Q 364,165 377,185" fill="none" stroke="url(#gold-bright)" stroke-width="4.5" />
    <!-- Center Arch -->
    <path d="M 381,180 Q 400,155 419,180" fill="none" stroke="url(#gold-bright)" stroke-width="5" />
    <!-- Right Arch -->
    <path d="M 423,185 Q 436,165 449,185" fill="none" stroke="url(#gold-bright)" stroke-width="4.5" />

    <!-- Bottom Grate / Panel Structures -->
    <rect x="340" y="300" width="120" height="4" rx="1" fill="url(#gold-dark)" />
    <rect x="345" y="304" width="110" height="8" rx="2" fill="url(#gold-bright)" />

    <!-- Lantern Bottom Base (Curved Drop-dome) -->
    <path d="M 350,312 Q 400,380 450,312 Q 400,340 350,312 Z" fill="url(#gold-primary)" />
    <path d="M 375,312 Q 400,372 425,312" stroke="url(#gold-bright)" stroke-width="1.5" fill="none" />
    <!-- Decorative Hanging Tassel Point -->
    <polygon points="400,366 397,375 403,375" fill="url(#gold-bright)" />
    <circle cx="400" cy="378" r="3" fill="url(#gold-bright)" />

    <!-- 5. SWEEPING CELESTIAL ORBITS (STELLAR SWOOSHES) -->
    <!-- Outer Orbit swoosh (Back/Mid Layer) -->
    <path d="M 315,282 C 340,305 450,290 495,190 C 475,235 390,292 315,282 Z" fill="url(#gold-bright)" />
    
    <!-- Main Sweeping Foreground Swoosh (Fitted beautifully around lantern) -->
    <path d="M 285,274 C 330,285 470,270 515,160 C 455,240 330,274 285,274 Z" fill="url(#gold-primary)" />
    
    <!-- Inner Edge Highlights for 3D Curved Appearance -->
    <path d="M 285,274 C 340,277 465,255 515,160" fill="none" stroke="#FFF5CE" stroke-width="1.5" opacity="0.8" />

    <!-- 6. FACETED GOLDEN STARS (8-Pointed Stars) -->
    <!-- Helper macro coordinates for 8-point stars scaled to size -->
    <!-- Star 1: Main Top Right Star -->
    <g transform="translate(515, 140) scale(1.6)" filter="url(#glow-bright)">
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="url(#gold-bright)" />
      <polygon points="0,-12 0,0 12,0" fill="#FFF5CE" opacity="0.5" />
      <polygon points="0,12 0,0 -12,0" fill="#AA8015" opacity="0.4" />
      <polygon points="0,0 -3,-3 0,-12" fill="#FFFFFF" opacity="0.7" />
      <polygon points="0,0 3,3 0,12" fill="#543F02" opacity="0.6" />
    </g>

    <!-- Star 2: Mid Right Star -->
    <g transform="translate(508, 220) scale(1.4)">
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="url(#gold-bright)" />
      <polygon points="0,-12 0,0 12,0" fill="#FFF5CE" opacity="0.5" />
      <polygon points="0,12 0,0 -12,0" fill="#AA8015" opacity="0.4" />
      <polygon points="0,0 -3,-3 0,-12" fill="#FFFFFF" opacity="0.7" />
    </g>

    <!-- Star 3: Left Sweeping Star (Start of Orbit) -->
    <g transform="translate(285, 274) scale(1.1)">
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="url(#gold-bright)" />
      <polygon points="0,-12 0,0 12,0" fill="#FFF5CE" opacity="0.5" />
      <polygon points="0,12 0,0 -12,0" fill="#AA8015" opacity="0.4" />
      <polygon points="0,0 -3,-3 0,-12" fill="#FFFFFF" opacity="0.7" />
    </g>

    <!-- Star 4: High Tiny Star -->
    <g transform="translate(470, 120) scale(0.9)">
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="url(#gold-bright)" />
      <polygon points="0,-12 0,0 12,0" fill="#FFF5CE" opacity="0.6" />
      <polygon points="0,12 0,0 -12,0" fill="#AA8015" opacity="0.5" />
    </g>
  </g>

  <!-- 7. EDITORIAL SERIF TYPOGRAPHY (AL NIBRAS GROUP) -->
  <g filter="url(#shadow-3d)">
    <text x="400" y="445" 
          font-family="'Playfair Display', 'Times New Roman', 'Georgia', serif" 
          font-size="44" 
          font-weight="900" 
          letter-spacing="5.5" 
          fill="url(#gold-primary)" 
          text-anchor="middle"
          style="text-transform: uppercase;">
      Al Nibras Group
    </text>
  </g>
</svg>
